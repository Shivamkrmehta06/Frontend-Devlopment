<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .first{
            font-style: italic;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>About me</h1>
    <p class="first">Dreaming makes you more hungry for the success</p>

    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Odit, dolor nisi. Aliquam, dolore? Fuga cumque ea eaque repellat <em>impedit!</em> Quod voluptate laborum, ab illum nesciunt velit. Nulla nesciunt incidunt vero.</p>
