<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            width: 1000px;
            height: 500px;
        }
    </style>
</head>
<body>
    <table border="1">
        <caption>Student Records</caption>
        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td colspan="2">Shivam</td>
            <td>20</td>
        </tr>
        <tr>
            <td rowspan="2">Kunal</td>
            <td rowspan="2">18</td>
        </tr>
    </table>
</body>
</html>
